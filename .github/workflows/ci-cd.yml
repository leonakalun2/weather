name: 🌤 Weather Service CI/CD

on:
  # Run on every push to main or develop
  push:
    branches: [main, develop]
  # Run on every pull request targeting main
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/weather-service

jobs:

  # ── Job 1: Build and Test ───────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore WeatherService.sln

      - name: Build solution
        run: dotnet build WeatherService.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test tests/WeatherService.Tests/WeatherService.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./test-results/unit

        env:
          ASPNETCORE_ENVIRONMENT: Development
          Jwt__Key: test-secret-key-for-ci-pipeline-32chars!!

      - name: Upload test results
        uses: actions/upload-artifact@v4
        # Always upload even if tests fail — so you can see what went wrong
        if: always()
        with:
          name: test-results
          path: ./test-results/

  # ── Job 2: Security Scan ────────────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    # Only runs after build-and-test passes
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WeatherService.sln

      - name: Scan for vulnerable packages
        run: |
          dotnet list WeatherService.sln package \
            --vulnerable \
            --include-transitive \
            2>&1 | tee vulnerability-report.txt

      - name: Fail if critical vulnerabilities found
        run: |
          if grep -q "Critical" vulnerability-report.txt; then
            echo "❌ Critical vulnerabilities found!"
            cat vulnerability-report.txt
            exit 1
          fi
          echo "✅ No critical vulnerabilities found"

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: vulnerability-report.txt

  # ── Job 3: Docker Build and Push ────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    # Only runs on pushes to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Required to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with branch name e.g. "main"
            type=ref,event=branch
            # Tag with short commit SHA e.g. "sha-a1b2c3d"
            type=sha,prefix=sha-
            # Tag as "latest" when pushing to main
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build for both Intel and Apple Silicon
          platforms: linux/amd64,linux/arm64
          # Cache layers in GitHub Actions cache — makes rebuilds faster
          cache-from: type=gha
          cache-to: type=gha,mode=max