name: 🌤 Weather Service CI/CD

on:
  # Run on every push to main or develop
  push:
    branches: [main, develop]
  # Run on every pull request targeting main
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/weather-service

jobs:

  # ── Job 1: Build and Test ───────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore WeatherService/WeatherService.slnx

      - name: Build solution
        run: dotnet build WeatherService/WeatherService.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test WeatherService/WeatherService.Test/WeatherService.Test.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./test-results/unit

        env:
          ASPNETCORE_ENVIRONMENT: Development
          Jwt__Key: test-secret-key-for-ci-pipeline-32chars!!

      - name: Upload test results
        uses: actions/upload-artifact@v4
        # Always upload even if tests fail — so you can see what went wrong
        if: always()
        with:
          name: test-results
          path: ./test-results/

  # ── Job 2: Security Scan ────────────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    # Only runs after build-and-test passes
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WeatherService/WeatherService.slnx

      - name: Scan for vulnerable packages
        run: |
          dotnet list WeatherService/WeatherService.slnx package \
            --vulnerable \
            --include-transitive \
            2>&1 | tee vulnerability-report.txt

      - name: Fail if critical vulnerabilities found
        run: |
          if grep -q "Critical" vulnerability-report.txt; then
            echo "❌ Critical vulnerabilities found!"
            cat vulnerability-report.txt
            exit 1
          fi
          echo "✅ No critical vulnerabilities found"

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: vulnerability-report.txt
          
# ── Job 3: Docker Build and Push ────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      # Pass the image tag to the deploy job
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Also push to Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/weather-service
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/weather-service
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./WeatherService
          file: WeatherService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to Azure Container Apps ───────────────────────────────────
  on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: weatherappreg.azurecr.io/
          username: ${{ secrets.AzureAppService_ContainerUsername_3caf93dd2b9044b38151941fe60935d1 }}
          password: ${{ secrets.AzureAppService_ContainerPassword_1426814e3a4646528fcbde7a0b049f5d }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: weatherappreg.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_3caf93dd2b9044b38151941fe60935d1 }}/weatherservice-weather-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'weather-svc'
          slot-name: 'Production'
          images: 'weatherappreg.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_3caf93dd2b9044b38151941fe60935d1 }}/weatherservice-weather-api:${{ github.sha }}'
          publish-profile: ${{ secrets.__publishingprofilesecretname__ }}

      - name: Run smoke test
        run: |
          echo "Waiting for deployment to stabilise..."
          sleep 30

          # Get the app URL
          APP_URL=$(az containerapp show \
            --name weather-service \
            --resource-group weather-service-rg \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "App URL: https://$APP_URL"

          # Hit the health endpoint
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$APP_URL/health)

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP $STATUS"
            exit 1
          fi

          echo "✅ Deployment successful — https://$APP_URL"